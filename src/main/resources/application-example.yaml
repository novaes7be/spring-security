server:
  port: 8082
spring:
  application:
    name: spring-essentials-jpa-training
  datasource:
    url: jdbc:mysql://localhost:3306/gym_security?createDatabaseIfNotExist=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
jwt:
  expiration: ${JWT_EXPIRATION:900000}
  key: ${JWT_KEY:}
